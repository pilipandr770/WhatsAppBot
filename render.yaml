# render.yaml — Deploy WhatsApp SaaS on Render.com
#
# DEPLOY STEPS:
#   1. Push this repo to GitHub
#   2. Go to render.com → New → Blueprint → connect repo
#   3. Render creates all services automatically
#   4. After first deploy — set the 4 "sync: false" variables in Dashboard:
#      - EVOLUTION_API_KEY  (any strong random string)
#      - ANTHROPIC_API_KEY
#      - STRIPE_SECRET_KEY / STRIPE_WEBHOOK_SECRET (or leave empty if Stripe not used yet)
#   5. Set SERVER_URL and APP_BASE_URL after you see your Render URLs (step below)
#
# AFTER FIRST DEPLOY (URLs are now known):
#   In evolution-api service → Environment:
#     SERVER_URL = https://evolution-api-XXXX.onrender.com
#   In whatsapp-saas-web service → Environment:
#     APP_BASE_URL    = https://whatsapp-saas-web-XXXX.onrender.com
#     EVOLUTION_API_URL = https://evolution-api-XXXX.onrender.com

databases:
  # Main app database
  - name: whatsapp-saas-db
    databaseName: whatsapp_saas
    plan: free
    user: wauser

  # Evolution API needs its own database
  - name: evolution-db
    databaseName: evolution_db
    plan: free
    user: evouser

services:
  # ── Redis ────────────────────────────────────────────────────────────────────
  - type: redis
    name: whatsapp-saas-redis
    plan: free
    maxmemoryPolicy: allkeys-lru

  # ── Evolution API (WhatsApp gateway) ─────────────────────────────────────────
  # NOTE: Use "starter" plan ($7/mo) for production — free tier sleeps after
  # 15 min inactivity and will disconnect your WhatsApp session.
  - type: web
    name: evolution-api
    runtime: image
    image:
      url: docker.io/evoapicloud/evolution-api:v2.3.7
    plan: starter
    disk:
      name: evolution-sessions
      mountPath: /evolution/instances
      sizeGB: 1
    envVars:
      - key: SERVER_URL
        sync: false          # Set after deploy: https://evolution-api-XXXX.onrender.com
      - key: AUTHENTICATION_TYPE
        value: apikey
      - key: AUTHENTICATION_API_KEY
        sync: false          # Set to same value as EVOLUTION_API_KEY below
      - key: AUTHENTICATION_EXPOSE_IN_FETCH_INSTANCES
        value: "true"
      - key: DATABASE_ENABLED
        value: "true"
      - key: DATABASE_PROVIDER
        value: postgresql
      - key: DATABASE_CONNECTION_URI
        fromDatabase:
          name: evolution-db
          property: connectionString
      - key: DATABASE_CONNECTION_CLIENT_NAME
        value: evolution_api
      - key: CACHE_REDIS_ENABLED
        value: "true"
      - key: CACHE_REDIS_URI
        fromService:
          name: whatsapp-saas-redis
          type: redis
          property: connectionString
      - key: CACHE_REDIS_PREFIX_KEY
        value: evolution
      - key: LOG_LEVEL
        value: "ERROR,WARN,LOG"
      - key: LOG_BAILEYS
        value: "error"
      - key: DEL_INSTANCE
        value: "0"
      - key: LANGUAGE
        value: "de-DE"

  # ── Flask Web App ─────────────────────────────────────────────────────────────
  - type: web
    name: whatsapp-saas-web
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: starter
    disk:
      name: web-uploads
      mountPath: /app/uploads
      sizeGB: 2
    buildFilter:
      paths:
        - app/**
        - requirements.txt
        - Dockerfile
        - run.py
        - celery_worker.py
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: whatsapp-saas-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: whatsapp-saas-redis
          type: redis
          property: connectionString
      - key: EVOLUTION_API_URL
        sync: false          # Set after deploy: https://evolution-api-XXXX.onrender.com
      - key: APP_BASE_URL
        sync: false          # Set after deploy: https://whatsapp-saas-web-XXXX.onrender.com
      - key: SECRET_KEY
        generateValue: true
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: EVOLUTION_API_KEY
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: STRIPE_PRICE_SOLO
        sync: false
      - key: STRIPE_PRICE_BUSINESS
        sync: false
      - key: STRIPE_PRICE_AGENTUR
        sync: false
      - key: UPLOAD_FOLDER
        value: /app/uploads
      # Documents are processed synchronously in the web process on Render
      # (no shared disk between web and worker services)
      - key: CELERY_TASK_ALWAYS_EAGER
        value: "true"
